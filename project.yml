name: TinyLog
options:
  bundleIdPrefix: com.tinylog
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"

packages:
  TinyKit:
    path: Packages/TinyKit

targets:
  TinyLog:
    type: application
    platform: macOS
    sources:
      - path: Sources/TinyLog
        excludes:
          - "Resources"
      - path: Sources/TinyLog/Resources/Assets.xcassets
        buildPhase: resources
      - path: Sources/TinyLog/Resources/AppIcon.icon
        buildPhase: resources
    info:
      path: Sources/TinyLog/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Log File
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - com.tinylog.log
            CFBundleTypeExtensions:
              - log
          - CFBundleTypeName: Output File
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - com.tinylog.out
            CFBundleTypeExtensions:
              - out
          - CFBundleTypeName: Error File
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - com.tinylog.err
            CFBundleTypeExtensions:
              - err
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
            CFBundleTypeExtensions:
              - txt
              - text
        LSApplicationCategoryType: public.app-category.productivity
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.tinylog.log
            UTTypeDescription: Log File
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - log
          - UTTypeIdentifier: com.tinylog.out
            UTTypeDescription: Output File
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - out
          - UTTypeIdentifier: com.tinylog.err
            UTTypeDescription: Error File
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - err
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinylog.app
        PRODUCT_NAME: "TinyLog"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        DEVELOPMENT_TEAM: 992N457T8D
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: TinyLog.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: NO
        INSTALL_PATH: /Applications
    dependencies:
      - package: TinyKit
        product: TinyKit
